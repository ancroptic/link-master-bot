services:
  - type: web
    name: linkmasterbot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_SHORTENER_TYPE
        value: gplinks
      - key: BASE_WEB_URL
        sync: false
      - key: RUN_MODE
        value: both
      - key: PYTHON_VERSION
        value: 3.11.9
